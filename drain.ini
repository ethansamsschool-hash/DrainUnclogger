#include <LiquidCrystal.h>
#include <Keypad.h>

const int ROW_NUM = 4; //four rows
const int COLUMN_NUM = 4; //four columns

char keys[ROW_NUM][COLUMN_NUM] = {
  {'1','2','3', 'A'},
  {'4','5','6', 'B'},
  {'7','8','9', 'C'},
  {'*','0','#', 'D'}
};

byte pin_rows[ROW_NUM] = {48, 46, 44, 42}; 
byte pin_column[COLUMN_NUM] = {40, 38, 36, 34}; 

Keypad keypad = Keypad( makeKeymap(keys), pin_rows, pin_column, ROW_NUM, COLUMN_NUM );

#define RDA 0x80
#define TBE 0x20  

volatile unsigned char *myUCSR0A = (unsigned char *)0x00C0;
volatile unsigned char *myUCSR0B = (unsigned char *)0x00C1;
volatile unsigned char *myUCSR0C = (unsigned char *)0x00C2;
volatile unsigned int  *myUBRR0  = (unsigned int *) 0x00C4;
volatile unsigned char *myUDR0   = (unsigned char *)0x00C6;
 
volatile unsigned char *my_ADMUX = (unsigned char *) 0x7C;
volatile unsigned char *my_ADCSRB = (unsigned char *) 0x7B;
volatile unsigned char *my_ADCSRA = (unsigned char *) 0x7A;
volatile unsigned int *my_ADC_DATA = (unsigned int *) 0x78;

// Sates, 0 = off, 1 = on, 2 = on&active
int state = 0;
int setState = 0;
 
unsigned long previousMillis = 0;
unsigned long previousMillisBuffer = 0;
bool buffer = false;

const int RS = 12, EN = 11, D4 = 5, D5 = 4, D6 = 3, D7 = 2;
LiquidCrystal lcd(RS, EN, D4, D5, D6, D7);


void setup() 
{
  lcd.begin(16,2);
  lcd.print("OFF");
  lcd.setCursor(0,1);
  // setup the UART
  U0init(9600);
  // setup the ADC
  adc_init();
DDRH |= (1 << PH3) | (1 << PH4); // Pin 6, 7
DDRH |= (1 << PH5);  
  PORTH |= (1 << PH3);
}

void loop() 
{
  // read the water sensor value by calling adc_read() and check the threshold to display the message accordingly
  int water = adc_read(0);
  unsigned long currentMillis = millis();
  //if the value is less than the threshold display the value on the Serial monitor
  if((water < 700) && ((state == 1) || (state == 2)) && (buffer == false)) {
    if (currentMillis - previousMillis <= 3000) {
      state = 2;
      previousMillis = currentMillis;
    } else {
      state = 1;
    }
  } 

  char key = keypad.getKey();
  if (key == '1' && state != 0){
    state = 0;
    buffer = false;
    char off[] = "The device has been turned off.\n";
      for (int i = 0; off[i] != '\0'; i++) {
        U0putchar(off[i]);
      }
  } else if (key == '2' && state != 1) {
    if (state == 0)
    {
      char on[] = "The device has been turned on.\n";
        for (int i = 0; on[i] != '\0'; i++) {
          U0putchar(on[i]);
        }
    } else {
        buffer = true;
        previousMillisBuffer = currentMillis;
        char inactive[] = "The device has been deactivated.\n";
        for (int i = 0; inactive[i] != '\0'; i++) {
          U0putchar(inactive[i]);
        }
    }
    state = 1;
  } else if (key == '3' && state != 2 && state != 0) {
    state = 2;
    char active[] = "The device has set to active.\n";
      for (int i = 0; active[i] != '\0'; i++) {
        U0putchar(active[i]);
      }
  }

  if (buffer == true && state != 0) {
    if ((previousMillisBuffer + 5000) > currentMillis){
      state = 1;
    } else {
      buffer = false;
      previousMillis = currentMillis;
    }
  }

  if (state == 0) {
    PORTH |= (1 << PH3);
    PORTH &= ~(1 << PH5);
    PORTH &= ~(1 << PH4);
  } else if (state == 1) {
    PORTH |= (1 << PH4); 
    PORTH &= ~(1 << PH5);
    PORTH &= ~(1 << PH3); 
  } else if (state == 2) {
    PORTH |= (1 << PH5);
  }

  if (millis() % 60000 == 0){
    if (state == 0){
      setState = 0;
      char off[] = "The device is currently off.\n";
      for (int i = 0; off[i] != '\0'; i++) {
        U0putchar(off[i]);
      }
    } else if (state == 1) {
      setState = 1;
      char on[] = "The device is currently on.\n";
      for (int i = 0; on[i] != '\0'; i++) {
        U0putchar(on[i]);
      }
    } else {
      setState = 2;
      char active[] = "The device is currently on and active.\n";
      for (int i = 0; active[i] != '\0'; i++) {
        U0putchar(active[i]);
      }
    }
  }

  if (millis() % 2000 == 0) {
    if (setState == 0) {
    lcd.clear();
    lcd.print("OFF");
    lcd.setCursor(15,1);
    } else if (setState == 1) {
      lcd.clear();
      lcd.print("ON");
      lcd.setCursor(15,1);
    } else {
      lcd.clear();
      lcd.print("ACTIVE");
      lcd.setCursor(15,1);
    }
  }
  /**/
}

void adc_init() 
{
 *my_ADCSRA |= 0x80;
 *my_ADCSRA &= ~0x20;
 *my_ADCSRA &= ~0x08;
 *my_ADCSRA &= ~0x07;
 *my_ADCSRB &= ~0x08;
 *my_ADCSRB &= ~0x07;
 *my_ADMUX &= ~(1 << 7);
 *my_ADMUX |= (1 << 6);
 *my_ADMUX &= ~(1 << 5);
 *my_ADMUX &= ~0x1F;
}
unsigned int adc_read(unsigned char adc_channel_num) 
{
 *my_ADMUX &= ~0x1F;
 *my_ADCSRB &= ~0x08;
 *my_ADMUX |= (adc_channel_num & 0x07);
 *my_ADCSRA |= 0x40;
 while((*my_ADCSRA & 0x40) != 0);
 return *my_ADC_DATA;
}

void U0init(int U0baud)
{
 unsigned long FCPU = 16000000;
 unsigned int tbaud;
 tbaud = (FCPU / 16 / U0baud - 1);
 // Same as (FCPU / (16 * U0baud)) - 1;
 *myUCSR0A = 0x20;
 *myUCSR0B = 0x18;
 *myUCSR0C = 0x06;
 *myUBRR0  = tbaud;
}
unsigned char U0kbhit()
{
  return *myUCSR0A & RDA;
}
unsigned char U0getchar()
{
  return *myUDR0;
}
void U0putchar(unsigned char U0pdata)
{
  while((*myUCSR0A & TBE)==0);
  *myUDR0 = U0pdata;
}
void print_int(unsigned int val) {
  char buf[10];
  itoa(val, buf, 10);
  for(int i = 0; buf[i] != '\0'; i++) U0putchar(buf[i]);
  U0putchar('\n');
}
